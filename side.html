<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="robots" content="noindex" />
    <title>Wedding seating | DA3WA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f6f1e8;
        --card: #fffdf8;
        --ink: #2f312d;
        --soft: #666455;
        --line: #dccfb8;
        --green: #1f5a4d;
        --gold: #b89156;
        --red: #9f4b41;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-width: 0;
        overflow-x: hidden;
        background: var(--bg);
        color: var(--ink);
        font:
          14px Manrope,
          system-ui,
          sans-serif;
      }
      button,
      input {
        font: inherit;
      }
      .shell {
        width: min(1440px, 100%);
        max-width: 1440px;
        margin: auto;
        padding: calc(12px + env(safe-area-inset-top)) 12px
          calc(28px + env(safe-area-inset-bottom));
        display: grid;
        gap: 12px;
      }
      .card {
        min-width: 0;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 8px 24px #2f312d0d;
      }
      .head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }
      .eyebrow {
        margin: 0;
        color: var(--gold);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .head h1,
      h2 {
        font-family: Fraunces, serif;
        margin: 3px 0;
      }
      .head h1 {
        font-size: 22px;
      }
      .muted {
        color: var(--soft);
        margin: 5px 0 0;
        line-height: 1.45;
      }
      .badge {
        padding: 6px 9px;
        border-radius: 99px;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
        background: #dbe9e4;
        color: #16463c;
      }
      .badge.readonly {
        background: #eee9df;
        color: #5d584d;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .stat {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 13px;
      }
      .stat strong {
        font:
          24px Fraunces,
          serif;
        display: block;
      }
      .stat span {
        font-size: 12px;
        color: var(--soft);
      }
      .toolbar {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        margin: 12px 0 8px;
      }
      .btn {
        border: 1px solid var(--line);
        background: #fffdf8;
        color: var(--ink);
        border-radius: 10px;
        min-height: 40px;
        padding: 8px 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn.primary {
        border-color: var(--green);
        background: var(--green);
        color: white;
      }
      .btn.danger {
        border-color: var(--red);
        color: var(--red);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: wait;
      }
      .map-viewport {
        width: 100%;
        height: clamp(380px, 62vh, 720px);
        min-height: 380px;
        overflow: hidden;
        border: 1px dashed var(--line);
        border-radius: 15px;
        touch-action: none;
        background: radial-gradient(
            circle at 30% 20%,
            #efe3cf80,
            transparent 45%
          ),
          #fbf8f1;
      }
      .map-world {
        position: relative;
        width: 1600px;
        height: 1000px;
        transform-origin: 0 0;
      }
      .table {
        position: absolute;
        transform: translate(-50%, -50%);
        display: grid;
        place-items: center;
        background: var(--fill, #f3ebdc);
        border: 2px solid var(--border, #bc9b61);
        color: var(--ink);
      }
      .table.round {
        border-radius: 50%;
      }
      .table:not(.round) {
        border-radius: 13px;
      }
      .table-label {
        font-weight: 800;
        font-size: 12px;
        text-align: center;
        max-width: 82%;
        pointer-events: none;
      }
      .table-label small {
        display: block;
        font-weight: 500;
        color: var(--soft);
      }
      .chair {
        position: absolute;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        width: 36px;
        height: 36px;
        border: 2px solid #cdbb97;
        background: #fffdf8;
        color: #4e4b41;
        font-size: 11px;
        font-weight: 800;
        display: grid;
        place-items: center;
        cursor: pointer;
        touch-action: manipulation;
      }
      .chair.occupied {
        background: var(--green);
        border-color: var(--green);
        color: white;
      }
      .chair.selected {
        outline: 4px solid #e5bd76;
        z-index: 2;
      }
      .chair:focus-visible,
      .btn:focus-visible {
        outline: 3px solid #b89156;
        outline-offset: 2px;
      }
      .roster {
        display: grid;
        gap: 7px;
        max-height: 350px;
        overflow: auto;
        overscroll-behavior: contain;
      }
      .row {
        padding: 10px;
        border-top: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      .row b {
        overflow-wrap: anywhere;
      }
      .row small {
        color: var(--soft);
        text-align: right;
      }
      .sheet-backdrop {
        position: fixed;
        inset: 0;
        background: #1f292540;
        display: grid;
        align-items: end;
        z-index: 5;
        padding: 0;
      }
      .sheet {
        background: var(--card);
        border-radius: 22px 22px 0 0;
        padding: 18px max(16px, env(safe-area-inset-right))
          calc(18px + env(safe-area-inset-bottom))
          max(16px, env(safe-area-inset-left));
        max-height: 85vh;
        overflow: auto;
        overscroll-behavior: contain;
      }
      .sheet h2 {
        font-size: 20px;
      }
      .search {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        margin: 8px 0;
      }
      .candidate {
        width: 100%;
        text-align: left;
        background: white;
        border: 1px solid var(--line);
        border-radius: 11px;
        padding: 11px;
        margin: 5px 0;
        cursor: pointer;
      }
      .candidate small {
        display: block;
        color: var(--soft);
        margin-top: 2px;
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        z-index: 9;
        background: #2f312d;
        color: white;
        padding: 10px 14px;
        border-radius: 10px;
        box-shadow: 0 5px 18px #0004;
      }
      .empty {
        padding: 24px;
        text-align: center;
        color: var(--soft);
      }
      @media (min-width: 650px) {
        .stats {
          grid-template-columns: repeat(4, 1fr);
        }
        .sheet-backdrop {
          align-items: center;
          padding: 20px;
        }
        .sheet {
          max-width: 540px;
          width: 100%;
          margin: auto;
          border-radius: 20px;
        }
      }
      @media (min-width: 900px) {
        .shell {
          grid-template-columns: minmax(0, 1.65fr) minmax(320px, 0.9fr);
          align-items: start;
          padding: 24px;
          gap: 16px;
        }
        .shell > .head,
        .shell > .stats {
          grid-column: 1 / -1;
        }
        .stats {
          grid-template-columns: repeat(8, minmax(0, 1fr));
        }
        .stat {
          min-height: 92px;
          padding: 14px;
        }
        .workspace-card {
          grid-column: 1;
          grid-row: 3;
        }
        .guest-card {
          grid-column: 2;
          grid-row: 3;
          position: sticky;
          top: 18px;
        }
        .map-viewport {
          height: clamp(560px, calc(100vh - 260px), 780px);
        }
        .roster {
          max-height: min(680px, calc(100vh - 290px));
        }
        .toolbar {
          margin-block: 14px 10px;
        }
        .btn {
          min-height: 42px;
        }
        .sheet {
          max-width: 620px;
          padding: 24px;
        }
      }
      @media (min-width: 1200px) {
        .shell { padding-inline: 32px; }
        .chair { width: 38px; height: 38px; }
      }
    </style>
  </head>
  <body>
    <main class="shell" id="sideShell" aria-live="polite"></main>
    <div id="modalRoot"></div>
    <script type="module" src="./side.js"></script>
  </body>
</html>
